spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: bustech-erp

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  contaazul:
    client-id: ${CONTAAZUL_CLIENT_ID:}
    client-secret: ${CONTAAZUL_CLIENT_SECRET:}
    redirect-uri: ${CONTAAZUL_REDIRECT_URI:}
    auth-url: https://auth.contaazul.com/login
    token-url: https://auth.contaazul.com/oauth2/token
    api-base-url: https://api-v2.contaazul.com
    # URL do frontend para redirecionar apos o OAuth2 callback
    frontend-return-url: ${CONTAAZUL_FRONTEND_URL:http://localhost:3000/dashboard.html}
    # API resource paths — Conta Azul API v2 (Portuguese)
    api-paths:
      categories: /v1/categorias
      cost-centers: /v1/centro-de-custo
      accounts: /v1/conta-financeira
      receivables: /v1/financeiro/eventos-financeiros/contas-a-receber/buscar
      payables: /v1/financeiro/eventos-financeiros/contas-a-pagar/buscar
      parcel-detail: /v1/financeiro/eventos-financeiros/parcelas/{id}
