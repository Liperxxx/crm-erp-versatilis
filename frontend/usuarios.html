<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — ERP Bustech</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<div class="erp-layout">
  <main class="page-content">

    <!-- Header -->
    <div class="filter-bar">
      <span class="filter-label">Usuários</span>
      <div class="filter-sep"></div>
      <select id="filter-role" class="filter-input" aria-label="Filtrar por perfil">
        <option value="">Todos os perfis</option>
        <option value="ADMIN">Admin</option>
        <option value="MANAGER">Gerente</option>
        <option value="OPERATOR">Operador</option>
        <option value="VIEWER">Visualizador</option>
      </select>
      <div class="filter-spacer"></div>
      <div class="filter-meta">
        <span class="filter-meta-dot"></span>
        <span id="user-count">Carregando…</span>
      </div>
    </div>

    <!-- Users table -->
    <div class="table-card">
      <div class="table-card-header">
        <span class="table-card-title">Lista de Usuários</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Perfil</th>
            <th>Empresa</th>
            <th>Status</th>
            <th>Criado em</th>
          </tr>
        </thead>
        <tbody id="users-table">
          <tr><td colspan="6" class="td-empty">Carregando…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="users-pagination"></div>

  </main><!-- /page-content -->
</div><!-- /erp-layout -->

<script src="/assets/js/api.js"></script>
<script src="/assets/js/components.js"></script>
<script src="/assets/js/usuarios.js"></script>
</body>
</html>
